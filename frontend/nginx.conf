# Nginx config for the built SPA.
#
# The app uses client-side (path-based) routing, so a request for e.g.
# /characters has no matching file on disk. Without a fallback nginx returns 404
# on reload/deep-link. try_files serves the requested file if it exists (real
# assets under /assets/...), otherwise falls back to index.html so the React app
# boots and renders the route.
#
# Note: /api/* never reaches here in production — caddy routes those to the
# backend before nginx is involved.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
