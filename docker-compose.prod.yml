# Production stack for a single-host deployment reached through a Cloudflare
# Tunnel (no inbound ports opened on the host/router).
#
#   internet ──► Cloudflare edge (TLS) ──► cloudflared ──► caddy
#                                                           ├─ /api/* ─► backend ─► db
#                                                           └─ /*     ─► frontend
#
# Nothing here needs a public IP or router port-forwarding: cloudflared makes an
# outbound connection to Cloudflare. Only caddy is published to the host (on
# 8080) for a local smoke test; remove that mapping if you don't want it.
#
# Usage:
#   cp .env.prod.example .env      # then fill in real values
#   docker compose -f docker-compose.prod.yml up -d --build

# Dedicated project name so this stack's containers and volumes are fully
# isolated from the dev stack (docker-compose.dev.yml), which runs from the same
# directory. Without this they'd share names/volumes and clobber each other's
# database.
name: initiative-prod

services:
  db:
    # Match the dev stack's major version (postgres:18). Note the volume mount
    # path: the postgres:18 image keeps its cluster under /var/lib/postgresql,
    # not /var/lib/postgresql/data as earlier majors did.
    image: postgres:18
    restart: always
    # Publish Postgres on the host loopback ONLY (127.0.0.1), so it's reachable
    # from on-box tooling / an SSH tunnel (e.g. pgAdmin) but never from the LAN
    # or internet. The backend still talks to it over the compose network as
    # `db:5432` — this mapping is purely for admin access.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: initiative_db
      POSTGRES_USER: initiative_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD to a strong value}
    volumes:
      - db_data:/var/lib/postgresql
      - ./start.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U initiative_user -d initiative_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        # Stamps the /version endpoint. Set when building, e.g.:
        #   GIT_SHA=$(git rev-parse --short HEAD) docker compose -f docker-compose.prod.yml up -d --build
        GIT_SHA: ${GIT_SHA:-dev}
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=initiative_user
      - DB_PASSWORD=${DB_PASSWORD:?set DB_PASSWORD to a strong value}
      - DB_NAME=initiative_db
      # Long, stable random value (e.g. `openssl rand -hex 32`). Without it the
      # app mints an ephemeral secret and logs every user out on each restart.
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET to a long random value}
      # Served over HTTPS via Cloudflare, so auth cookies must be Secure.
      - SECURE_COOKIES=true
      # Public URL of the site (also the OAuth post-login redirect target).
      - FRONTEND_URL=${FRONTEND_URL:?set FRONTEND_URL to https://your-domain}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:?set DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:?set DISCORD_CLIENT_SECRET}
      # Must be https://your-domain/api/auth/discord/callback and match the
      # redirect URI registered in the Discord developer portal exactly.
      - DISCORD_REDIRECT_URL=${DISCORD_REDIRECT_URL:?set DISCORD_REDIRECT_URL}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Same short SHA baked into the frontend bundle (shown in the footer).
        GIT_SHA: ${GIT_SHA:-dev}
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    # Built from ./caddy so the Caddyfile is baked into the image — the running
    # stack has no host-file dependency on it (survives moving/deleting the
    # project directory and reboots).
    build: ./caddy
    restart: unless-stopped
    environment:
      # Host header that routes to the Beszel monitoring hub (e.g.
      # beszel.your-domain). Unset -> defaults to a host nobody uses, so the
      # monitoring route stays dormant and the main app is unaffected.
      - BESZEL_HOSTNAME=${BESZEL_HOSTNAME:-beszel.invalid}
    # Local smoke test only: http://localhost:8080 . Login won't work over plain
    # http (Secure cookies) — the real test is through the tunnel's https URL.
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
      - frontend

  # --- Read-only monitoring (Beszel) ---
  # Two parts: the hub (web dashboard, reached via caddy at BESZEL_HOSTNAME) and
  # an agent that reports this host's metrics to the hub. Beszel is a monitor
  # only — it cannot control the machine. First-run setup (create the admin
  # account, add this host with the agent's key) is in DEPLOY.md.
  beszel:
    image: henrygd/beszel:latest
    restart: unless-stopped
    # No host port published — caddy reaches it over the compose network as
    # `beszel:8090`. Data (accounts, history) persists in the named volume.
    volumes:
      - beszel_data:/beszel_data
    # Lets the hub reach the host-networked agent: when you "Add System" in the
    # web UI, use host `host.docker.internal` port `45876`. host-gateway resolves
    # to this compose network's gateway (not necessarily 172.17.0.1).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  beszel-agent:
    image: henrygd/beszel-agent:latest
    restart: unless-stopped
    # host networking so the agent reports the *host's* real CPU/mem/net/disk
    # (not a container's namespace) and listens on the host's :45876 for the hub.
    network_mode: host
    volumes:
      # Read-only docker socket enables per-container stats on the dashboard.
      # Read-only, but still a privileged handle — that's why the subdomain is
      # gated by Cloudflare Access (see DEPLOY.md).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LISTEN=45876
      # Public key the hub generates when you click "Add System" — paste it into
      # the prod .env. Empty until then; the agent just restart-loops harmlessly
      # (the rest of the stack is unaffected) until you set it.
      - KEY=${BESZEL_KEY:-}
    depends_on:
      - beszel

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Token from the Cloudflare Zero Trust dashboard tunnel you create.
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:?set TUNNEL_TOKEN to your Cloudflare tunnel token}
    depends_on:
      - caddy

volumes:
  db_data:
  beszel_data:
