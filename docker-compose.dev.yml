services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: initiative_db
      POSTGRES_USER: initiative_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5431:5432"
    volumes:
      - db_data:/var/lib/postgresql
      - ./start.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: air
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=initiative_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=initiative_db
      # Stable secret so logins survive air hot-reloads in dev. Override via a
      # real SESSION_SECRET in the environment; never use this value in prod.
      - SESSION_SECRET=${SESSION_SECRET:-dev-insecure-session-secret}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  db_data:
